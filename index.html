<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Practice Test</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --border: #2c2c2c;
    --text: #1a1a1a;
    --muted: #555;
    --accent: #1a3a6b;
    --highlight: #e8f0fe;
    --correct: #1b5e20;
    --wrong: #b71c1c;
    --section-bg: #e8e0d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--accent);
    color: white;
    text-align: center;
    padding: 20px 24px 16px;
    border-bottom: 4px double #8899bb;
  }
  .site-header h1 {
    font-size: 26px;
    letter-spacing: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .site-header p {
    font-size: 13px;
    letter-spacing: 2px;
    opacity: 0.8;
    margin-top: 5px;
  }

  /* ── SETUP ── */
  #setup-screen {
    max-width: 620px;
    margin: 50px auto;
    background: var(--paper);
    border: 2px solid var(--border);
    padding: 44px;
  }
  #setup-screen h2 {
    font-size: 18px;
    letter-spacing: 2px;
    text-align: center;
    border-bottom: 2px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 30px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .field-label {
    display: block;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .api-section { margin-bottom: 28px; }
  .api-section input {
    width: 100%;
    border: 1.5px solid #aaa;
    background: #fafafa;
    padding: 11px 14px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    transition: border 0.2s;
  }
  .api-section input:focus { border-color: var(--accent); }
  .api-help {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.7;
  }
  .api-help a { color: var(--accent); text-decoration: none; }
  .api-help a:hover { text-decoration: underline; }

  .part-section { margin-bottom: 30px; }
  .part-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .part-btn {
    border: 1.5px solid var(--border);
    background: var(--paper);
    padding: 13px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .part-btn:hover { background: var(--section-bg); }
  .part-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .part-btn .pnum { font-size: 16px; font-weight: 700; display: block; }
  .part-btn .pname { font-size: 12px; margin-top: 3px; opacity: 0.85; }

  .start-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 16px;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #0d2a57; }
  .start-btn:disabled { background: #999; cursor: not-allowed; }

  .error-msg {
    background: #fff3f3;
    border: 1px solid #e57373;
    padding: 12px 16px;
    margin-top: 14px;
    font-size: 13px;
    color: #c62828;
    display: none;
    white-space: pre-line;
    line-height: 1.7;
  }

  /* ── LOADING ── */
  #loading-screen {
    display: none;
    text-align: center;
    max-width: 400px;
    margin: 120px auto;
    padding: 40px;
  }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid #ddd;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 22px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--muted); line-height: 1.8; }

  /* ── TEST SCREEN ── */
  #test-screen { display: none; max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper);
    border: 1.5px solid var(--border);
    padding: 11px 20px;
    margin-bottom: 22px;
  }
  .meta-left { font-size: 13px; color: #666; letter-spacing: 1px; }
  .timer {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .timer.urgent { color: var(--wrong); }

  .part-block {
    background: var(--paper);
    border: 1.5px solid var(--border);
    margin-bottom: 30px;
  }
  .part-header {
    background: var(--accent);
    color: white;
    padding: 10px 20px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .directions-box {
    background: var(--section-bg);
    border-bottom: 1px solid #aaa;
    padding: 12px 20px;
    font-size: 13px;
    font-style: italic;
    color: #444;
    line-height: 1.75;
  }
  .passage-area {
    padding: 18px 22px 14px;
    border-bottom: 1px dashed #ccc;
    font-size: 15px;
    line-height: 2;
    color: var(--text);
  }
  .passage-area.lc-script { background: #f9f9f9; }
  .audio-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: white;
    padding: 4px 12px;
    font-size: 12px;
    margin-bottom: 12px;
    letter-spacing: 1px;
    font-weight: 500;
  }
  .spk-label {
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
    margin-right: 5px;
  }
  .p5-stem {
    font-size: 15px;
    line-height: 1.9;
    padding: 11px 14px;
    background: #f4f1ea;
    border-left: 3px solid var(--accent);
    margin-bottom: 12px;
    color: var(--text);
  }
  .questions-area { padding: 18px 22px 22px; }
  .question-item {
    margin-bottom: 22px;
    padding-bottom: 20px;
    border-bottom: 1px dotted #ccc;
  }
  .question-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .q-number { font-size: 13px; font-weight: 700; margin-bottom: 9px; color: var(--accent); }
  .q-text { font-size: 15.5px; line-height: 1.8; margin-bottom: 13px; }

  .choices { list-style: none; }
  .choices li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 6px;
    transition: all 0.1s;
  }
  .choices li:hover:not(.disabled) { background: var(--highlight); border-color: #9eb8e8; }
  .choices li.selected  { background: #dde8fc; border-color: var(--accent); }
  .choices li.correct   { background: #e8f5e9; border-color: var(--correct); color: var(--correct); }
  .choices li.wrong     { background: #ffebee; border-color: var(--wrong);   color: var(--wrong); text-decoration: line-through; }
  .choices li.reveal-correct { background: #e8f5e9; border-color: var(--correct); color: var(--correct); }
  .choices li.disabled  { cursor: default; }

  .choice-letter {
    display: inline-flex;
    min-width: 23px; height: 23px;
    border: 1.5px solid currentColor;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .choices li.selected .choice-letter        { background: var(--accent);  color: white; border-color: var(--accent); }
  .choices li.correct .choice-letter         { background: var(--correct); color: white; border-color: var(--correct); }
  .choices li.wrong .choice-letter           { background: var(--wrong);   color: white; border-color: var(--wrong); }
  .choices li.reveal-correct .choice-letter  { background: var(--correct); color: white; border-color: var(--correct); }

  .explanation-box {
    display: none;
    margin-top: 10px;
    background: #f0f4ff;
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.75;
    color: #333;
  }

  .submit-area { text-align: center; margin-top: 30px; }
  .submit-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 15px 52px;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: #0d2a57; }

  /* ── RESULT ── */
  #result-screen {
    display: none;
    max-width: 660px;
    margin: 50px auto;
    padding: 16px;
  }
  .result-card {
    background: var(--paper);
    border: 2px solid var(--border);
    padding: 44px;
    text-align: center;
  }
  .result-card h2 {
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 26px;
    font-weight: 700;
  }
  .score-big { font-size: 72px; font-weight: 700; color: var(--accent); line-height: 1; }
  .score-label { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; margin-bottom: 6px; }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin: 24px 0;
  }
  .stat-box { border: 1px solid #ccc; padding: 16px 8px; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
  .btn-outline {
    border: 1.5px solid var(--accent); color: var(--accent); background: transparent;
    padding: 11px 28px; font-size: 14px; letter-spacing: 1px; cursor: pointer;
    font-weight: 500; transition: all 0.15s;
  }
  .btn-outline:hover { background: var(--accent); color: white; }
  .btn-solid {
    background: var(--accent); color: white; border: 1.5px solid var(--accent);
    padding: 11px 28px; font-size: 14px; letter-spacing: 1px; cursor: pointer;
    font-weight: 500; transition: background 0.15s;
  }
  .btn-solid:hover { background: #0d2a57; }

  @media (max-width: 600px) {
    #setup-screen { margin: 16px; padding: 28px 20px; }
    .result-card { padding: 28px 20px; }
    .result-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>TOEIC Practice Test</h1>
  <p>Powered by Google Gemini AI</p>
</header>

<!-- ── SETUP ── -->
<div id="setup-screen">
  <h2>Test Configuration</h2>

  <div class="api-section">
    <label class="field-label">Google Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off" />
    <p class="api-help">
      무료 API 키 발급 →
      <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>
      에서 "Get API key" → "Create API key"<br>
      gemini-2.0-flash 기준 <strong>하루 1,500회 무료</strong> (각 사용자 본인 키 소모)
    </p>
  </div>

  <div class="part-section">
    <label class="field-label">파트 선택</label>
    <div class="part-grid">
      <button class="part-btn" data-part="1">
        <span class="pnum">Part 1</span>
        <span class="pname">사진 묘사 (LC)</span>
      </button>
      <button class="part-btn" data-part="2">
        <span class="pnum">Part 2</span>
        <span class="pname">질의응답 (LC)</span>
      </button>
      <button class="part-btn" data-part="3">
        <span class="pnum">Part 3</span>
        <span class="pname">짧은 대화 (LC)</span>
      </button>
      <button class="part-btn" data-part="4">
        <span class="pnum">Part 4</span>
        <span class="pname">짧은 담화 (LC)</span>
      </button>
      <button class="part-btn" data-part="5">
        <span class="pnum">Part 5</span>
        <span class="pname">단문 공란 (RC)</span>
      </button>
      <button class="part-btn" data-part="6">
        <span class="pnum">Part 6</span>
        <span class="pname">장문 공란 (RC)</span>
      </button>
      <button class="part-btn" data-part="7">
        <span class="pnum">Part 7</span>
        <span class="pname">독해 (RC)</span>
      </button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" disabled>Generate Test ▶</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- ── LOADING ── -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p class="loading-text">Gemini AI로 문제를 생성하고 있습니다…<br>잠시만 기다려 주세요.</p>
</div>

<!-- ── TEST ── -->
<div id="test-screen">
  <div class="meta-bar">
    <div class="meta-left">TOEIC PRACTICE TEST</div>
    <div class="timer" id="timer">00:00</div>
  </div>
  <div id="test-content"></div>
  <div class="submit-area">
    <button class="submit-btn" id="submit-btn">Submit Answers</button>
  </div>
</div>

<!-- ── RESULT ── -->
<div id="result-screen">
  <div class="result-card">
    <h2>Test Result</h2>
    <div class="score-big" id="score-display">—</div>
    <div class="score-label">SCORE</div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="res-correct">0</div>
        <div class="stat-lbl">정답</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="res-total">0</div>
        <div class="stat-lbl">전체</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="res-time">0:00</div>
        <div class="stat-lbl">풀이 시간</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-outline" id="review-btn">답안 확인</button>
      <button class="btn-solid"   id="retry-btn">New Test</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';

let selectedParts = [];
let testData      = [];
let userAnswers   = {};
let timerInterval = null;
let startTime     = null;
let submitted     = false;

/* ─────────────────────────────────────────
   SETUP INTERACTIONS
───────────────────────────────────────── */
document.querySelectorAll('.part-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = btn.dataset.part;
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      selectedParts = selectedParts.filter(x => x !== p);
    } else {
      btn.classList.add('selected');
      selectedParts.push(p);
    }
    document.getElementById('start-btn').disabled = (selectedParts.length === 0);
  });
});

document.getElementById('start-btn').addEventListener('click', startTest);
document.getElementById('submit-btn').addEventListener('click', submitTest);

document.getElementById('retry-btn').addEventListener('click', () => {
  submitted   = false;
  userAnswers = {};
  testData    = [];
  selectedParts.forEach(p =>
    document.querySelector(`.part-btn[data-part="${p}"]`).classList.remove('selected')
  );
  selectedParts = [];
  document.getElementById('start-btn').disabled = true;
  showScreen('setup');
});

document.getElementById('review-btn').addEventListener('click', () => showScreen('test'));

/* ─────────────────────────────────────────
   PROMPT BUILDER
───────────────────────────────────────── */
function buildPrompt(parts) {
  const instructions = parts.map(p => {
    switch (p) {
      case '1': return `
PART 1 (Photographs – LC):
Generate 1 set. Passage: Describe a workplace or public scene photo in detail (4–6 sentences).
Questions: 6 choices (A–D), each a short statement. Only one correctly describes the scene; others have subtle errors (wrong subject/action/location).`;

      case '2': return `
PART 2 (Question-Response – LC):
Generate 1 set. Passage: One spoken question or statement (label as "Narrator:").
Questions: 3 items, each with 3 choices (A)(B)(C). Only one is a natural, correct reply.`;

      case '3': return `
PART 3 (Short Conversations – LC):
Generate 1 set. Passage: A realistic 6–10 turn dialogue between Man and Woman on a business topic. Label each line "Man:" or "Woman:".
Questions: 3 questions with choices (A)(B)(C)(D).`;

      case '4': return `
PART 4 (Short Talks – LC):
Generate 1 set. Passage: A monologue (announcement / news report / phone message) of 8–12 sentences. Label "Narrator:".
Questions: 3 questions with choices (A)(B)(C)(D).`;

      case '5': return `
PART 5 (Incomplete Sentences – RC):
Generate 1 set = 4 individual sentences. For each sentence, use "text" field for the sentence with a blank (______).
Set "passage" to empty string "". Each question has 4 choices (A)(B)(C)(D) testing grammar or vocabulary.`;

      case '6': return `
PART 6 (Text Completion – RC):
Generate 1 set. Passage: A business email or memo (150–200 words) with exactly 4 blanks marked [1]_______, [2]_______, [3]_______, [4]_______.
Questions: 4 questions (one per blank), choices (A)(B)(C)(D).`;

      case '7': return `
PART 7 (Reading Comprehension – RC):
Generate 1 set. Passage: An article, email, or notice (180–230 words) on a business topic.
Questions: 4 questions (main idea, detail, inference, vocabulary), choices (A)(B)(C)(D).`;
    }
  }).join('\n');

  return `You are an expert TOEIC test writer. Generate realistic, high-quality TOEIC practice questions.

Return ONLY valid JSON (no markdown, no code fences) in this exact structure:
{
  "parts": [
    {
      "partNumber": "3",
      "partTitle": "Part 3: Short Conversations",
      "directions": "In this part of the test, you will hear several conversations...",
      "isListening": true,
      "passage": "Man: ...\nWoman: ...",
      "questions": [
        {
          "number": 32,
          "text": "What are the speakers discussing?",
          "choices": ["(A) ...", "(B) ...", "(C) ...", "(D) ..."],
          "answer": "B",
          "explanation": "한국어 해설..."
        }
      ]
    }
  ]
}

TOEIC question numbering to use:
Part 1 → Q1–6 | Part 2 → Q7–9 | Part 3 → Q32–34 | Part 4 → Q71–73
Part 5 → Q101–104 | Part 6 → Q131–134 | Part 7 → Q147–150

Parts to generate: ${parts.join(', ')}

${instructions}

RULES:
- isListening: true for Parts 1–4, false for Parts 5–7
- Part 5: set "passage" to "" and put the sentence-with-blank inside each question's "text" field
- Difficulty must match actual TOEIC exam level
- Write ALL explanations in Korean (한국어)
- Return ONLY the JSON object, nothing else`;
}

/* ─────────────────────────────────────────
   START TEST
───────────────────────────────────────── */
async function startTest() {
  const apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey)               { showError('API 키를 입력해 주세요.'); return; }
  if (!selectedParts.length) { showError('파트를 하나 이상 선택해 주세요.'); return; }

  showError('');
  showScreen('loading');

  try {
    let resp;
    try {
      resp = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: buildPrompt(selectedParts) }] }],
          generationConfig: { temperature: 0.9, maxOutputTokens: 8192 }
        })
      });
    } catch (netErr) {
      throw new Error(
        'API 연결 실패 (Failed to fetch)\n\n' +
        '해결 방법:\n' +
        '① 파일을 file://로 직접 열지 마세요.\n' +
        '   GitHub Pages 또는 로컬 서버(Live Server 등)로 열어야 합니다.\n' +
        '② API 키를 다시 확인해 주세요.\n' +
        '③ VPN이나 광고 차단 확장 프로그램을 꺼보세요.'
      );
    }

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      const code = resp.status;
      let msg = err?.error?.message || `HTTP ${code}`;
      if (code === 400) msg = '잘못된 요청 (400): API 키 형식을 확인해 주세요.';
      if (code === 403) msg = '인증 실패 (403): API 키가 유효하지 않습니다. Google AI Studio에서 재발급해 주세요.';
      if (code === 429) msg = '요청 한도 초과 (429): 잠시 후 다시 시도해 주세요.';
      throw new Error(msg);
    }

    const data = await resp.json();
    const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const json = extractJSON(raw);
    testData   = json.parts || [];

    if (!testData.length) throw new Error('문제 생성에 실패했습니다. 다시 시도해 주세요.');

    renderTest(testData);
    showScreen('test');
    startTimer();

  } catch (e) {
    showScreen('setup');
    showError(e.message);
  }
}

function extractJSON(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if (m) return JSON.parse(m[0]);
  return JSON.parse(text);
}

/* ─────────────────────────────────────────
   RENDER TEST
───────────────────────────────────────── */
function renderTest(parts) {
  const container = document.getElementById('test-content');
  container.innerHTML = '';

  parts.forEach(part => {
    const block = document.createElement('div');
    block.className = 'part-block';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'part-header';
    hdr.textContent = part.partTitle || `Part ${part.partNumber}`;
    block.appendChild(hdr);

    // Directions
    if (part.directions) {
      const dir = document.createElement('div');
      dir.className = 'directions-box';
      dir.textContent = part.directions;
      block.appendChild(dir);
    }

    // Passage (not Part 5)
    if (part.passage && String(part.partNumber) !== '5') {
      const psg = document.createElement('div');
      psg.className = 'passage-area' + (part.isListening ? ' lc-script' : '');

      if (part.isListening) {
        const badge = document.createElement('div');
        badge.className = 'audio-badge';
        badge.textContent = '▶ AUDIO SCRIPT (실제 시험에서는 음성으로 제공)';
        psg.appendChild(badge);
      }

      part.passage.split('\n').filter(l => l.trim()).forEach(line => {
        const p = document.createElement('p');
        p.style.marginBottom = '7px';
        p.innerHTML = line.replace(
          /^(Man|Woman|Narrator|Speaker\s*\w*):/i,
          m => `<span class="spk-label">${m}</span>`
        );
        psg.appendChild(p);
      });

      block.appendChild(psg);
    }

    // Questions
    const qArea = document.createElement('div');
    qArea.className = 'questions-area';

    part.questions.forEach((q, qi) => {
      const qid  = `q_${part.partNumber}_${qi}`;
      const isP5 = String(part.partNumber) === '5';

      const qDiv = document.createElement('div');
      qDiv.className = 'question-item';

      // Stem
      const stemEl = document.createElement('div');
      stemEl.className = isP5 ? 'p5-stem' : 'q-text';
      stemEl.textContent = q.text;

      // Number
      const numEl = document.createElement('div');
      numEl.className = 'q-number';
      numEl.textContent = `Question ${q.number || (qi + 1)}`;

      // Choices
      const ul = document.createElement('ul');
      ul.className = 'choices';
      ul.dataset.qid = qid;

      q.choices.forEach((choice, ci) => {
        const li     = document.createElement('li');
        const letter = ['A','B','C','D'][ci];
        const text   = choice.replace(/^\([A-D]\)\s*/, '');
        li.innerHTML = `<span class="choice-letter">${letter}</span><span>${text}</span>`;
        li.addEventListener('click', () => selectAnswer(qid, letter, ul));
        ul.appendChild(li);
      });

      // Explanation
      const exp = document.createElement('div');
      exp.className = 'explanation-box';
      exp.id = `exp_${qid}`;
      exp.textContent = q.explanation || '';

      qDiv.appendChild(numEl);
      qDiv.appendChild(stemEl);
      qDiv.appendChild(ul);
      qDiv.appendChild(exp);
      qArea.appendChild(qDiv);
    });

    block.appendChild(qArea);
    container.appendChild(block);
  });
}

/* ─────────────────────────────────────────
   ANSWER / SUBMIT
───────────────────────────────────────── */
function selectAnswer(qid, letter, ul) {
  if (submitted) return;
  userAnswers[qid] = letter;
  ul.querySelectorAll('li').forEach((li, i) => {
    li.classList.toggle('selected', ['A','B','C','D'][i] === letter);
  });
}

function submitTest() {
  if (submitted) return;
  submitted = true;
  stopTimer();

  let correct = 0, total = 0;

  testData.forEach(part => {
    part.questions.forEach((q, qi) => {
      total++;
      const qid       = `q_${part.partNumber}_${qi}`;
      const selected  = userAnswers[qid];
      const correctAns = (q.answer || '').toUpperCase();
      const ul        = document.querySelector(`.choices[data-qid="${qid}"]`);
      if (!ul) return;

      ul.querySelectorAll('li').forEach(li => li.classList.add('disabled'));
      ul.querySelectorAll('li').forEach((li, i) => {
        const ltr = ['A','B','C','D'][i];
        li.classList.remove('selected');
        if (ltr === correctAns) {
          li.classList.add(selected === ltr ? 'correct' : 'reveal-correct');
          if (selected === ltr) correct++;
        } else if (ltr === selected) {
          li.classList.add('wrong');
        }
      });

      const expBox = document.getElementById(`exp_${qid}`);
      if (expBox) expBox.style.display = 'block';
    });
  });

  setTimeout(() => showResult(correct, total), 300);
}

function showResult(correct, total) {
  const elapsed = getElapsed();
  const pct = total ? Math.round(correct / total * 100) : 0;
  document.getElementById('score-display').textContent = `${pct}%`;
  document.getElementById('res-correct').textContent   = correct;
  document.getElementById('res-total').textContent     = total;
  document.getElementById('res-time').textContent      = formatTime(elapsed);
  showScreen('result');
}

/* ─────────────────────────────────────────
   TIMER
───────────────────────────────────────── */
function startTimer() {
  startTime = Date.now();
  const el  = document.getElementById('timer');
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    el.textContent = formatTime(s);
    el.classList.toggle('urgent', s > 600);
  }, 1000);
}
function stopTimer()  { clearInterval(timerInterval); }
function getElapsed() { return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0; }
function formatTime(s) {
  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

/* ─────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────── */
function showScreen(name) {
  document.getElementById('setup-screen').style.display   = name === 'setup'   ? '' : 'none';
  document.getElementById('loading-screen').style.display = name === 'loading' ? '' : 'none';
  document.getElementById('test-screen').style.display    = name === 'test'    ? '' : 'none';
  document.getElementById('result-screen').style.display  = name === 'result'  ? '' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent  = msg;
  el.style.display = msg ? 'block' : 'none';
}

// Init
showScreen('setup');
</script>
